services:
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana-llm-dev
    ports:
      - "3000:3000"
    volumes:
      - ./dist:/var/lib/grafana/plugins/tamcore-llmanalysis-app
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=tamcore-llmanalysis-app
      - GF_SECURITY_ADMIN_PASSWORD=admin
