apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana-llm
  labels:
    app: grafana
spec:
  version: "12.4.2"

  config:
    security:
      admin_user: admin
    plugins:
      allow_loading_unsigned_plugins: tamcore-llmanalysis-app

  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin
                      key: password
                - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
                  value: tamcore-llmanalysis-app
                - name: GF_INSTALL_PLUGINS
                  value: "https://github.com/tamcore/grafana-llmanalysis-app/releases/latest/download/tamcore-llmanalysis-app-linux-amd64.zip;tamcore-llmanalysis-app"
              volumeMounts:
                - name: llm-plugin-config
                  mountPath: /etc/grafana/provisioning/plugins
                  readOnly: true
                - name: sa-token
                  mountPath: /var/run/secrets/grafana-sa
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: llm-plugin-config
              secret:
                secretName: llm-plugin-config
            - name: sa-token
              secret:
                secretName: llm-sa-token
                optional: true

  ingress:
    metadata:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        kubernetes.io/tls-acme: "true"
    spec:
      ingressClassName: nginx
      rules:
        - host: grafana.example.com
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: grafana-service
                    port:
                      number: 3000
      tls:
        - hosts:
            - grafana.example.com
          secretName: grafana-tls
