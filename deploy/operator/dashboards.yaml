apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: kubernetes
  namespace: grafana-llm
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  title: Kubernetes
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cluster-overview
  namespace: grafana-llm
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  folder: kubernetes
  url: https://raw.githubusercontent.com/tamcore/grafana-llmanalysis-app/master/deploy/dashboards/cluster-overview.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-metrics
  namespace: grafana-llm
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  folder: kubernetes
  url: https://raw.githubusercontent.com/tamcore/grafana-llmanalysis-app/master/deploy/dashboards/node-metrics.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pod-workloads
  namespace: grafana-llm
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  folder: kubernetes
  url: https://raw.githubusercontent.com/tamcore/grafana-llmanalysis-app/master/deploy/dashboards/pod-workloads.json
